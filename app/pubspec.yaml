name: on_your_mark
description: Interactive running/walking app - Draw shapes with your routes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Navigation
  go_router: ^12.1.1
  
  # Network & API
  dio: ^5.4.0
  graphql_flutter: ^5.1.2
  
  # AWS
  amplify_flutter: ^2.0.0
  amplify_auth_cognito: ^2.0.0
  amplify_api: ^2.0.0
  amplify_storage_s3: ^2.0.0
  
  # Maps & Location
  mapbox_maps_flutter: ^2.0.0
  geolocator: ^10.1.0
  flutter_compass: ^0.8.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Audio & Voice
  # agora_rtc_engine: ^6.3.0  # TODO: Enable after Agora setup
  flutter_tts: ^3.8.5

  # Notifications
  # firebase_messaging: ^14.7.6  # TODO: Enable after Firebase setup
  
  # Health & Fitness
  # health: ^10.0.0  # TODO: Re-enable when intl compatibility fixed
  
  # Connectivity
  connectivity_plus: ^6.1.5
  
  # Permissions
  permission_handler: ^11.1.0
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  
  # Utils
  intl: any
  uuid: ^4.2.1
  path_provider: ^2.1.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  
  # Encryption
  pointycastle: ^3.7.3
  encrypt: ^5.0.3
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  # hive_generator removed - using Hive without code generation
  mockito: ^5.4.4
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/maps/
  
  # fonts:
  #   - family: OnYourMark
  #     fonts:
  #       - asset: assets/fonts/OnYourMark-Regular.ttf
  #       - asset: assets/fonts/OnYourMark-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/OnYourMark-Light.ttf
  #         weight: 300
